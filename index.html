<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <link rel="stylesheet" href="index.css">
    <title>Team Generator</title>
  </head>
  <body>
    <header>
      <h1>Team Generator</h1>
    </header>
    <main>
      <form>
        <label for="gameCount">How many games?</label>
        <input type="number" id="gameCount" min="1" max="50" name="gameCount" value=1>
      </form><br>
      <div>
        <button id="decrease" type="button" onclick="decreasePlayerCount()"> - </button>
        <button id="increase" type="button" onclick="increasePlayerCount()"> + </button>
        <br>
      </div>
      <form id="playersForm"></form>
      <div id="teamButton"></div><br>
      <div id="players"></div><br>
      <div id="teams"></div><br>
      <script src="index.js"></script>
    </main>
    <footer>
      <p><small>Justine - 2026</small></p>
    </footer>
  </body>
</html>
