<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="index.css">
    <title>Team Generator</title>
  </head>
  <body>
    <header>
      <h1>Team Generator</h1>
      <div>
        <button id="print" type="button" onclick="window.print()">Print</button>
      </div>
    </header>
    <main>
      <div class = "container">
      <form id="playersForm">
        <label for="gameCount">How many games?</label>
        <input type="number" id="gameCount" min="1" max="50" name="gameCount" value=1>
        <br>
        <div>
          <button id="clear" type="button" onclick="clearPlayers()">Clear</button>
          <button id="decrease" type="button" onclick="decreasePlayerCount()"> - </button>
          <button id="increase" type="button" onclick="increasePlayerCount()"> + </button>
          <button id="playersListButton" type="button" onclick="displayPlayers()">Generate Teams</button>
          <br>
        </div>
      </form>
      <div id="teamButton"></div><br>
      <div id="players"></div><br>
      <div id="teams"></div><br>
    </div>
      <script src="index.js"></script>
    </main>
    <footer>
      <p><small>Justine - 2026</small></p>
    </footer>
  </body>
</html>
